    "/v1/news/{source_id}": {
      "get": {
        "tags": [
          "news",
          "public"
        ],
        "summary": "Get Source",
        "description": "Items for one source \u2014 cache-first with the ported TTL semantics.\n\nFor ``reddit-*`` sources the optional ``sort`` parameter selects\nan alternative feed (``new``, ``top``, ``rising``).  ``top`` is\nscoped to the past day (``?t=day``).  Any other source silently\nignores the parameter and returns the standard feed.",
        "operationId": "news:get_source",
        "parameters": [
          {
            "name": "source_id",
            "in": "path",
            "required": true,
            "schema": {
              "type": "string",
              "title": "Source Id"
            }
          },
          {
            "name": "latest",
            "in": "query",
            "required": false,
            "schema": {
              "type": "boolean",
              "default": false,
              "title": "Latest"
            }
          },
          {
            "name": "sort",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string",
              "pattern": "^(hot|new|top|rising)$",
              "default": "hot",
              "title": "Sort"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Successful Response",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/SourceResponse"
                }
              }
            }
          },
          "422": {
            "description": "Validation Error",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/HTTPValidationError"
                }
              }
            }
          }
        },
        "x-speakeasy-group": "news",
        "x-speakeasy-name-override": "get_source"
      }
    },
