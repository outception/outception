    "/v1/users/me/oauth-accounts/{platform}": {
      "delete": {
        "tags": [
          "users",
          "private"
        ],
        "summary": "Disconnect Oauth Account",
        "description": "Disconnect an OAuth account (GitHub or Google) from the authenticated user.\n\nThis allows users to unlink their OAuth provider while keeping their Outception account.\nThey can still authenticate using other methods (email magic link or other OAuth providers).\n\nNote: You cannot disconnect your last authentication method if your email is not verified.",
        "operationId": "users:disconnect_oauth_account",
        "security": [
          {
            "oidc": []
          },
          {
            "pat": []
          }
        ],
        "parameters": [
          {
            "name": "platform",
            "in": "path",
            "required": true,
            "schema": {
              "$ref": "#/components/schemas/OAuthPlatform"
            }
          }
        ],
        "responses": {
          "204": {
            "description": "Successful Response"
          },
          "404": {
            "description": "OAuth account not found"
          },
          "400": {
            "description": "Cannot disconnect last authentication method"
          },
          "422": {
            "description": "Validation Error",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/HTTPValidationError"
                }
              }
            }
          }
        },
        "x-speakeasy-group": "users",
        "x-speakeasy-name-override": "disconnect_oauth_account",
        "x-speakeasy-ignore": true
      }
    },
