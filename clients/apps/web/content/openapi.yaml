        "x-speakeasy-ignore": true
      },
      "delete": {
        "tags": [
          "users",
          "private"
        ],
        "summary": "Delete Authenticated User",
        "description": "Delete the authenticated user account.\n\nA user can only be deleted if all organizations they are members of have been\ndeleted first. If the user has active organizations, the response will include\nthe list of organizations that must be deleted before the user account can be\nremoved.\n\nWhen deleted:\n- User's email is anonymized\n- User's avatar and metadata are cleared\n- User's OAuth accounts are deleted (cascade)\n\n**Scopes**: `user:write`",
        "operationId": "users:delete_authenticated_user",
        "responses": {
          "200": {
            "description": "Deletion result",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/UserDeletionResponse"
                }
              }
            }
          }
        },
        "security": [
          {
            "oidc": [
              "user:write"
            ]
          },
          {
            "pat": [
              "user:write"
            ]
          }
        ],
        "x-outception-allowed-subjects": [
          "User"
        ],
        "x-speakeasy-group": "users",
        "x-speakeasy-name-override": "delete_authenticated_user",
        "x-speakeasy-ignore": true
      },
