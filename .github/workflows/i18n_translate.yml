name: Generate Translations

on:
  # Run on PRs and on direct pushes to main (this repo deploys by pushing
  # straight to main, so new en.ts strings must be translated on push too). The
  # bot commits only the non-en locale files, which don't match these paths, so
  # it never re-triggers itself. workflow_dispatch lets you backfill on demand
  # (e.g. after locales drift) without touching en.ts.
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "clients/packages/i18n/src/locales/en.ts"
      - "clients/packages/i18n/src/config.ts"
  pull_request:
    paths:
      - "clients/packages/i18n/src/locales/en.ts"
      - "clients/packages/i18n/src/config.ts"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  translate:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ github.workspace }}/clients

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3
        with:
          # PRs check out the PR head branch; direct pushes check out the pushed
          # branch (main).
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v6.0.8
        with:
          package_json_file: clients/package.json

      - name: Setup Node.js environment
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: clients/.node-version
          cache: "pnpm"
          cache-dependency-path: "clients/pnpm-lock.yaml"

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Generate translations
        # Keyless Google Translate — no secret needed.
        run: pnpm --filter @outception-com/i18n translate

      - name: Commit translations
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/i18n/
          git diff --staged --quiet || git commit -m "chore(i18n): update translations"
          git push
